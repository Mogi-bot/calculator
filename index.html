<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
minimum-scale=1,
user-scalable=no,
viewport-fit=cover">

<title>Calculator</title>

<meta
name="theme-color"
content="#000000">

<meta
name="apple-mobile-web-app-capable"
content="yes">

<meta
name="apple-mobile-web-app-status-bar-style"
content="black-translucent">

<meta
name="apple-mobile-web-app-title"
content="Calculator">

<meta
name="format-detection"
content="telephone=no">

<link
rel="manifest"
href="manifest.json">

<link
rel="apple-touch-icon"
sizes="180x180"
href="icon-180.png">

<link
rel="icon"
sizes="192x192"
href="icon-192.png">

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<div id="calculator">

    <!--==========================
            DISPLAY
    ==========================-->

    <div id="displayArea">

        <div id="expression"></div>

        <div id="displayRow">

            <div id="modeIndicator"></div>

            <div id="display">
                0
            </div>

        </div>

    </div>

    <!--==========================
            BUTTONS
    ==========================-->

    <div id="buttons">

        <button
            class="btn function"
            data-action="clear">

            AC

        </button>

        <button
            class="btn function"
            data-action="sign">

            ±

        </button>

        <button
            class="btn function"
            data-action="percent">

            %

        </button>

        <button
            id="divideButton"
            class="btn operator">

            ÷

        </button>

        <button class="btn number">7</button>
        <button class="btn number">8</button>
        <button class="btn number">9</button>

        <button
            class="btn operator"
            data-action="multiply">

            ×

        </button>

        <button class="btn number">4</button>
        <button class="btn number">5</button>
        <button class="btn number">6</button>

        <button
            class="btn operator"
            data-action="minus">

            −

        </button>

        <button class="btn number">1</button>
        <button class="btn number">2</button>
        <button class="btn number">3</button>

        <button
            class="btn operator"
            data-action="plus">

            +

        </button>

        <button
            class="btn number zero">

            0

        </button>

        <button
            class="btn number">

            .

        </button>

        <button
            id="equalsButton"
            class="btn operator">

            =

        </button>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
