<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,
initial-scale=1,
viewport-fit=cover">

<title>Calculator</title>

<link rel="manifest" href="manifest.json">

<link rel="stylesheet" href="style.css">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">

</head>

<body>

<div class="calculator">

    <div class="display-area">

        <div id="display">
            0
        </div>

    </div>

    <div class="buttons">

        <button class="function" data-action="ac">AC</button>
        <button class="function" data-action="sign">±</button>
        <button class="function" data-action="percent">%</button>
        <button class="operator secret-button"
                data-action="divide">
            ÷
        </button>

        <button class="number">7</button>
        <button class="number">8</button>
        <button class="number">9</button>
        <button class="operator" data-action="multiply">×</button>

        <button class="number">4</button>
        <button class="number">5</button>
        <button class="number">6</button>
        <button class="operator" data-action="minus">−</button>

        <button class="number">1</button>
        <button class="number">2</button>
        <button class="number">3</button>
        <button class="operator" data-action="plus">+</button>

        <button class="number zero">0</button>
        <button class="number">.</button>
        <button class="operator"
                data-action="equals">
            =
        </button>

    </div>

</div>

<!-- 設定画面 -->

<div id="settingOverlay">

    <div id="settingWindow">

        <h2>Magic Settings</h2>

        <label>

            <input
                type="checkbox"
                id="magicEnabled">

            Magic Mode

        </label>

        <br><br>

        <label>

            Result Number

        </label>

        <input
            id="magicNumber"
            type="text"
            placeholder="123456">

        <div class="settingButtons">

            <button id="saveSetting">
                Save
            </button>

            <button id="cancelSetting">
                Cancel
            </button>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
