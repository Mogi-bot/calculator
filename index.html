<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <!-- 画面の拡大縮小を禁止し、ホーム画面でアプリ風に起動するための設定 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="電卓">
    <title>電卓</title>
    
    <!-- iPhoneホーム画面用のアイコン設定（同フォルダのicon.pngを読み込み） -->
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="apple-touch-icon-precomposed" href="icon.png">

    <style>
        /* 全体のリセットと拡大・選択の禁止（アプリ化のための必須処理） */
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            position: fixed;
        }

        /* 電卓全体のコンテナ */
        .calculator {
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            width: 100%;
            height: 100%;
            padding: 20px 20px calc(20px + env(safe-area-inset-bottom)) 20px;
        }

        /* 上部ヘッダー（アイコン用スペース） */
        .header {
            position: absolute;
            top: calc(10px + env(safe-area-inset-top));
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 44px;
            z-index: 10;
        }
        .header-btn {
            width: 38px;
            height: 38px;
            background-color: #1c1c1e;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-size: 18px;
        }
        /* マジシャンモードの隠しMマーク */
        #magic-indicator {
            font-size: 12px;
            color: #333; /* 目立たない薄いグレー */
            font-weight: bold;
            visibility: hidden;
        }

        /* ディスプレイ部分 */
        .display {
            padding: 10px;
            text-align: right;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            flex-grow: 1;
            margin-bottom: 15px;
        }
        .formula {
            color: #888;
            font-size: 24px;
            min-height: 30px;
            word-wrap: break-word;
            word-break: break-all;
            margin-bottom: 5px;
        }
        .result {
            color: #fff;
            font-size: 70px;
            font-weight: 300;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: clip;
        }

        /* ボタンのグリッド構造 */
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }

        /* ボタンの共通スタイル */
        .btn {
            background-color: #333;
            color: #fff;
            border-radius: 50%;
            aspect-ratio: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: 400;
            cursor: pointer;
            transition: opacity 0.1s;
        }
        .btn:active {
            opacity: 0.6;
        }

        /* 機能ボタン（最上段：バックスペース、AC、％） */
        .btn.function {
            background-color: #a5a5a5;
            color: #000;
            font-size: 26px;
        }
        /* 演算子ボタン（右列：÷, ×, －, ＋, ＝） */
        .btn.operator {
            background-color: #ff9f0a;
            color: #fff;
            font-size: 36px;
        }

        /* 0ボタン */
        .btn.zero {
            grid-column: span 1;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-btn">☰</div>
        <div id="magic-indicator">M</div>
    </div>

    <div class="calculator">
        <div class="display">
            <div class="formula" id="formula"></div>
            <div class="result" id="result">0</div>
        </div>
        
        <div class="buttons">
            <!-- 1段目 -->
            <div class="btn function" onclick="handleKey('backspace')">⌫</div>
            <div class="btn function" onclick="handleKey('AC')">AC</div>
            <div class="btn function" onclick="handleKey('%')">%</div>
            <div class="btn operator" id="divide-btn" 
                 typeof="button"
                 ontouchstart="startPress(event)" 
                 onmousedown="startPress(event)"
                 ontouchend="endPress(event)" 
                 onmouseup="endPress(event)">÷</div>

            <!-- 2段目 -->
            <div class="btn" onclick="handleKey('7')">7</div>
            <div class="btn" onclick="handleKey('8')">8</div>
            <div class="btn" onclick="handleKey('9')">9</div>
            <div class="btn operator" onclick="handleKey('×')">×</div>

            <!-- 3段目 -->
            <div class="btn" onclick="handleKey('4')">4</div>
            <div class="btn" onclick="handleKey('5')">5</div>
            <div class="btn" onclick="handleKey('6')">6</div>
            <div class="btn operator" onclick="handleKey('－')">－</div>

            <!-- 4段目 -->
            <div class="btn" onclick="handleKey('1')">1</div>
            <div class="btn" onclick="handleKey('2')">2</div>
            <div class="btn" onclick="handleKey('3')">3</div>
            <div class="btn operator" onclick="handleKey('+')">+</div>

            <!-- 5段目 -->
            <div class="btn" onclick="handleKey('+/-')">+/-</div>
            <div class="btn zero" onclick="handleKey('0')">0</div>
            <div class="btn" onclick="handleKey('.')">.</div>
            <div class="btn operator" onclick="handleKey('=')">=</div>
        </div>
    </div>

    <script>
        // 状態管理用変数
        let currentInput = "0";      
        let memoryFormula = "";      
        let activeOperator = null;   
        let previousValue = null;    
        let isResetOnNextKey = false;

        // マジック用変数
        let isMagicMode = false;     
        let magicNumber = null;      

        // 長押しタイマー用
        let pressTimer = null;
        let isLongPressActioned = false;

        // iOS用のダブルタップズーム防止
        document.addEventListener('touchstart', function (event) {
            if (event.touches.length > 1) {
                event.preventDefault();
            }
        }, { passive: false });
        
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function (event) {
            const now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        // ディスプレイ描画更新
        function updateDisplay() {
            const resEl = document.getElementById("result");
            const formEl = document.getElementById("formula");
            
            let formatted = currentInput;
            if (!isNaN(currentInput) && currentInput !== "" && !currentInput.includes('e')) {
                const parts = currentInput.split('.');
                parts[0] = Number(parts[0]).toLocaleString('en-US');
                formatted = parts.join('.');
            }
            
            resEl.innerText = formatted;
            formEl.innerText = memoryFormula;

            if (formatted.length > 10) {
                resEl.style.fontSize = "40px";
            } else if (formatted.length > 7) {
                resEl.style.fontSize = "55px";
            } else {
                resEl.style.fontSize = "70px";
            }
        }

        // ÷ボタン長押し検知 (2秒)
        function startPress(e) {
            e.preventDefault();
            isLongPressActioned = false;
            pressTimer = setTimeout(() => {
                toggleMagicMode();
                isLongPressActioned = true;
            }, 2000);
        }

        function endPress(e) {
            clearTimeout(pressTimer);
            if (!isLongPressActioned) {
                handleKey('÷');
            }
        }

        // モードの切り替え処理
        function toggleMagicMode() {
            if (!isMagicMode) {
                isMagicMode = true;
                document.getElementById("magic-indicator").style.visibility = "visible";
                if (magicNumber !== null) {
                    currentInput = magicNumber;
                } else {
                    currentInput = "0";
                }
                memoryFormula = "";
            } else {
                isMagicMode = false;
                document.getElementById("magic-indicator").style.visibility = "hidden";
                if (currentInput === "0" || currentInput === "") {
                    magicNumber = null;
                } else {
                    magicNumber = currentInput;
                }
                currentInput = "0";
                memoryFormula = "";
            }
            updateDisplay();
            if (navigator.vibrate) navigator.vibrate(50);
        }

        // キー入力メインルーティン
        function handleKey(key) {
            if (isMagicMode) {
                handleMagicInput(key);
                return;
            }
            handleNormalInput(key);
        }

        // マジシャンモード中の操作
        function handleMagicInput(key) {
            if (!isNaN(key) || key === '.') {
                if (currentInput === "0" && key !== '.') {
                    currentInput = key;
                } else {
                    if (key === '.' && currentInput.includes('.')) return;
                    currentInput += key;
                }
            } else if (key === 'AC') {
                currentInput = "0";
            } else if (key === 'backspace') {
                if (currentInput.length > 1) {
                    currentInput = currentInput.slice(0, -1);
                } else {
                    currentInput = "0";
                }
            } else if (key === '+/-') {
                if (currentInput !== "0") {
                    currentInput = currentInput.startsWith('-') ? currentInput.slice(1) : '-' + currentInput;
                }
            }
            updateDisplay();
        }

        // 通常モード時の計算・トリック処理
        function handleNormalInput(key) {
            if (!isNaN(key)) {
                if (currentInput === "0" || isResetOnNextKey) {
                    currentInput = key;
                    isResetOnNextKey = false;
                } else {
                    currentInput += key;
                }
            } else if (key === '.') {
                if (isResetOnNextKey) {
                    currentInput = "0.";
                    isResetOnNextKey = false;
                    updateDisplay();
                    return;
                }
                if (!currentInput.includes('.')) {
                    currentInput += '.';
                }
            } else if (key === 'AC') {
                currentInput = "0";
                memoryFormula = "";
                previousValue = null;
                activeOperator = null;
                isResetOnNextKey = false;
            } else if (key === 'backspace') {
                if (currentInput.length > 1) {
                    currentInput = currentInput.slice(0, -1);
                } else {
                    currentInput = "0";
                }
            } else if (key === '+/-') {
                if (currentInput !== "0") {
                    currentInput = currentInput.startsWith('-') ? currentInput.slice(1) : '-' + currentInput;
                }
            } else if (key === '%') {
                currentInput = String(parseFloat(currentInput) / 100);
            } else if (['+', '－', '×', '÷'].includes(key)) {
                previousValue = currentInput;
                activeOperator = key;
                memoryFormula = previousValue + " " + key;
                isResetOnNextKey = true;
            } else if (key === '=') {
                if (activeOperator && previousValue !== null) {
                    memoryFormula = memoryFormula + " " + currentInput;
                    
                    // まず本来の正しい計算結果を算出する
                    let realResult = 0;
                    const v1 = parseFloat(previousValue);
                    const v2 = parseFloat(currentInput);
                    switch(activeOperator) {
                        case '+': realResult = v1 + v2; break;
                        case '－': realResult = v1 - v2; break;
                        case '×': realResult = v1 * v2; break;
                        case '÷': realResult = v2 !== 0 ? v1 / v2 : "Error"; break;
                    }

                    // 【300以下の判定ロジック】
                    if (magicNumber !== null && (realResult === "Error" || realResult > 300)) {
                        // マジックナンバーが設定されていて、かつ正しい答えが300を超える（またはエラーの）場合はすり替える
                        currentInput = magicNumber;
                    } else {
                        // マジックナンバー未設定、または正しい答えが300以下の場合は、本物の電卓として正しい結果を出す
                        currentInput = String(realResult);
                    }

                    activeOperator = null;
                    previousValue = null;
                    isResetOnNextKey = true;
                }
            }
            updateDisplay();
        }

        // 初期化
        updateDisplay();
    </script>
</body>
</html>
