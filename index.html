<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
minimum-scale=1,
user-scalable=no,
viewport-fit=cover">

<title>Calculator</title>

<meta
name="apple-mobile-web-app-capable"
content="yes">

<meta
name="apple-mobile-web-app-status-bar-style"
content="black">

<meta
name="theme-color"
content="#000000">

<link rel="manifest"
href="manifest.json">

<link
rel="apple-touch-icon"
href="icon-180.png">

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<div id="calculator">

    <!--==============================
            DISPLAY
    ==============================-->

    <div id="displayArea">

        <div id="expression"></div>

        <div id="display">

            0

        </div>

        <div id="modeIndicator">

        </div>

    </div>

    <!--==============================
            BUTTONS
    ==============================-->

    <div id="buttons">

        <button
            class="function"
            data-action="ac">

            AC

        </button>

        <button
            class="function"
            data-action="sign">

            ±

        </button>

        <button
            class="function"
            data-action="percent">

            %

        </button>

        <button
            class="operator secret-button"
            data-action="divide">

            ÷

        </button>

        <button class="number">7</button>
        <button class="number">8</button>
        <button class="number">9</button>

        <button
            class="operator"
            data-action="multiply">

            ×

        </button>

        <button class="number">4</button>
        <button class="number">5</button>
        <button class="number">6</button>

        <button
            class="operator"
            data-action="minus">

            −

        </button>

        <button class="number">1</button>
        <button class="number">2</button>
        <button class="number">3</button>

        <button
            class="operator"
            data-action="plus">

            +

        </button>

        <button
            class="number zero">

            0

        </button>

        <button
            class="number">

            .

        </button>

        <button
            class="operator"
            data-action="equals">

            =

        </button>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
